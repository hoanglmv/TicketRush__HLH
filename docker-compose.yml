# ================================================================
# TicketRush — Full Docker Development Environment
# ================================================================
#
#  Chạy toàn bộ hệ thống:
#    docker compose up -d --build
#
#  Xem logs:
#    docker compose logs -f backend
#    docker compose logs -f frontend
#
#  Dừng tất cả:
#    docker compose down
#
#  Reset database (xóa hết data):
#    docker compose down -v
#    docker compose up -d --build
#
# ================================================================
# Ports đã được chọn để KHÔNG xung đột với phần mềm cài sẵn:
#   MySQL:    3307  (tránh xung đột MySQL local 3306)
#   Redis:    6380  (tránh xung đột Redis local 6379)
#   Backend:  8080
#   Frontend: 5173
# ================================================================

services:

  # ========== DATABASE ==========
  mysql:
    image: mysql:8.0
    container_name: ticketrush-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ticketrush
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ticketrush-net

  # ========== CACHE / QUEUE ==========
  redis:
    image: redis:7-alpine
    container_name: ticketrush-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketrush-net

  # ========== BACKEND (Spring Boot) ==========
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketrush-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticketrush-net

  # ========== FRONTEND (React + Vite) ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketrush-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - ticketrush-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  ticketrush-net:
    driver: bridge

server:
  port: 8080

spring:
  application:
    name: TicketRush

  datasource:
    url: jdbc:mysql://localhost:3307/ticketrush?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6380
      password:
      timeout: 5000

  jackson:
    default-property-inclusion: non_null

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# JWT Configuration
app:
  jwt:
    secret: TicketRushSuperSecretKeyForJWTTokenGeneration2026MustBeAtLeast256Bits
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # Seat lock timeout in minutes
  seat-lock-timeout-minutes: 10

  # Virtual queue default batch size
  queue-default-batch-size: 50

  # CORS
  cors:
    allowed-origins: http://localhost:5173

  # LLM API
  llm:
    groq:
      api-key: ${GROQ_API_KEY:YOUR_GROQ_API_KEY_HERE}
      model: llama3-8b-8192
